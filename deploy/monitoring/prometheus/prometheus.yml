global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: localhost

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: email-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - email-worker:9091
