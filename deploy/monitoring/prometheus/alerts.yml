groups:
  - name: kelmio-runtime
    rules:
      - alert: BackendMetricsUnavailable
        expr: up{job="backend"} == 0
        for: 30s
        labels:
          severity: critical
          service: backend
        annotations:
          summary: Backend metrics endpoint is unavailable
          description: Prometheus has not scraped the backend metrics endpoint for 30 seconds.

      - alert: DatabaseNotReady
        expr: kelmio_database_ready{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: Application database is not ready
          description: The backend database readiness collector has reported an unavailable database for one minute.

      - alert: EmailWorkerUnavailable
        expr: up{job="email-worker"} == 0
        for: 30s
        labels:
          severity: critical
          service: email-worker
        annotations:
          summary: Email worker metrics endpoint is unavailable
          description: Prometheus has not scraped the email worker metrics endpoint for 30 seconds.

      - alert: EmailWorkerHeartbeatStale
        expr: kelmio_email_worker_heartbeat_timestamp_seconds{job="email-worker"} == 0 or (time() - kelmio_email_worker_heartbeat_timestamp_seconds{job="email-worker"}) > 60
        for: 1m
        labels:
          severity: warning
          service: email-worker
        annotations:
          summary: Email worker heartbeat is stale
          description: The email worker has not completed a polling heartbeat in more than one minute.

      - alert: EmailDeliveryFailures
        expr: kelmio_email_outbox_records{job="backend",status="failed"} > 0
        for: 30s
        labels:
          severity: warning
          service: email-worker
        annotations:
          summary: Email outbox contains terminal failures
          description: At least one email exhausted all configured delivery attempts.

      - alert: EmailWorkerBatchErrors
        expr: increase(kelmio_email_worker_batch_errors_total{job="email-worker"}[5m]) > 0
        labels:
          severity: warning
          service: email-worker
        annotations:
          summary: Email worker batch processing failed
          description: The email worker recorded a claim or processing-loop error during the last five minutes.

  - name: kelmio-operations
    rules:
      - alert: BackupRunnerUnavailable
        expr: up{job="backup-worker"} == 0
        for: 30s
        labels:
          severity: critical
          service: backup-worker
        annotations:
          summary: Scheduled backup runner is unavailable
          description: Prometheus has not scraped the backup worker metrics endpoint for 30 seconds.

      - alert: BackupFailed
        expr: kelmio_backup_last_result{job="backup-worker",result="failure"} == 1
        for: 30s
        labels:
          severity: warning
          service: backup-worker
        annotations:
          summary: Latest scheduled backup failed
          description: The backup worker could not complete its latest PostgreSQL backup attempt.

      - alert: BackupStale
        expr: (kelmio_backup_last_success_timestamp_seconds{job="backup-worker"} > 0) and ((time() - kelmio_backup_last_success_timestamp_seconds{job="backup-worker"}) > 93600)
        for: 5m
        labels:
          severity: warning
          service: backup-worker
        annotations:
          summary: Latest successful backup is stale
          description: No successful backup has been recorded in the last 26 hours.

      - alert: RestoreDrillStale
        expr: (kelmio_restore_drill_last_success_timestamp_seconds{job="backup-worker"} > 0) and ((time() - kelmio_restore_drill_last_success_timestamp_seconds{job="backup-worker"}) > 93600)
        for: 5m
        labels:
          severity: warning
          service: restore-drill
        annotations:
          summary: Latest successful restore drill is stale
          description: No successful restore drill has been recorded in the last 26 hours.

      - alert: RestoreDrillUnavailable
        expr: absent(kelmio_restore_drill_last_attempt_timestamp_seconds{job="backup-worker"}) or kelmio_restore_drill_last_attempt_timestamp_seconds{job="backup-worker"} == 0
        for: 1m
        labels:
          severity: critical
          service: restore-drill
        annotations:
          summary: Restore drill metrics are unavailable
          description: The backup worker is not exposing restore drill operational metrics.

      - alert: RestoreDrillFailed
        expr: kelmio_restore_drill_last_result{job="backup-worker",result="failure"} == 1
        for: 30s
        labels:
          severity: critical
          service: restore-drill
        annotations:
          summary: Latest restore drill failed
          description: The latest scheduled backup could not be verified in isolated PostgreSQL.
