<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Team Task Tracker platform architecture</title>
  <desc id="desc">A connected platform map linking work management, planning, service management, product discovery, assets, analytics, automation and AI to a shared platform core.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7f8f4"/><stop offset="1" stop-color="#e8eee8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#17211b" flood-opacity=".12"/></filter>
  </defs>
  <rect width="1600" height="820" rx="34" fill="url(#bg)"/>
  <g fill="none" stroke="#9db2a2" stroke-width="3" stroke-dasharray="8 10">
    <path d="M800 410 325 180M800 410 800 145M800 410 1275 180M800 410 325 640M800 410 800 675M800 410 1275 640"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="575" y="300" width="450" height="220" rx="32" fill="#17211b"/>
    <text x="800" y="368" fill="#a9d2b5" font-family="Aptos, Segoe UI, sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="3">SHARED PLATFORM CORE</text>
    <text x="800" y="420" fill="#fff" font-family="Georgia, serif" font-size="38" text-anchor="middle">One connected work graph</text>
    <text x="800" y="463" fill="#b9c6bd" font-family="Aptos, Segoe UI, sans-serif" font-size="17" text-anchor="middle">Identity  |  Permissions  |  Workflows  |  Search  |  Audit</text>
  </g>
  <g font-family="Aptos, Segoe UI, sans-serif" text-anchor="middle" filter="url(#shadow)">
    <g><rect x="115" y="96" width="420" height="165" rx="24" fill="#fff" stroke="#d4ddd5"/><circle cx="325" cy="137" r="20" fill="#dce8df"/><text x="325" y="143" fill="#31543d" font-size="15" font-weight="900">W</text><text x="325" y="189" fill="#17211b" font-family="Georgia, serif" font-size="27">Work and delivery</text><text x="325" y="222" fill="#69756d" font-size="14">Issues | workflows | boards | releases</text></g>
    <g><rect x="590" y="62" width="420" height="165" rx="24" fill="#fff" stroke="#d4ddd5"/><circle cx="800" cy="103" r="20" fill="#f8ead7"/><text x="800" y="109" fill="#8c561f" font-size="15" font-weight="900">P</text><text x="800" y="155" fill="#17211b" font-family="Georgia, serif" font-size="27">Plans and analytics</text><text x="800" y="188" fill="#69756d" font-size="14">Goals | capacity | reports | dashboards</text></g>
    <g><rect x="1065" y="96" width="420" height="165" rx="24" fill="#fff" stroke="#d4ddd5"/><circle cx="1275" cy="137" r="20" fill="#d9eef1"/><text x="1275" y="143" fill="#226775" font-size="15" font-weight="900">S</text><text x="1275" y="189" fill="#17211b" font-family="Georgia, serif" font-size="27">Service management</text><text x="1275" y="222" fill="#69756d" font-size="14">Portal | queues | SLAs | incidents</text></g>
    <g><rect x="115" y="559" width="420" height="165" rx="24" fill="#fff" stroke="#d4ddd5"/><circle cx="325" cy="600" r="20" fill="#d9eef1"/><text x="325" y="606" fill="#226775" font-size="15" font-weight="900">D</text><text x="325" y="652" fill="#17211b" font-family="Georgia, serif" font-size="27">Product discovery</text><text x="325" y="685" fill="#69756d" font-size="14">Ideas | insights | prioritization | roadmaps</text></g>
    <g><rect x="590" y="593" width="420" height="165" rx="24" fill="#fff" stroke="#d4ddd5"/><circle cx="800" cy="634" r="20" fill="#f8ead7"/><text x="800" y="640" fill="#8c561f" font-size="15" font-weight="900">A</text><text x="800" y="686" fill="#17211b" font-family="Georgia, serif" font-size="27">Assets and configuration</text><text x="800" y="719" fill="#69756d" font-size="14">CMDB | services | ownership | dependencies</text></g>
    <g><rect x="1065" y="559" width="420" height="165" rx="24" fill="#fff" stroke="#d4ddd5"/><circle cx="1275" cy="600" r="20" fill="#dce8df"/><text x="1275" y="606" fill="#31543d" font-size="15" font-weight="900">I</text><text x="1275" y="652" fill="#17211b" font-family="Georgia, serif" font-size="27">Automation and AI</text><text x="1275" y="685" fill="#69756d" font-size="14">Rules | integrations | assistants | governance</text></g>
  </g>
</svg>
