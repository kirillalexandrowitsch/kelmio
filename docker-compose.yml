services:
  postgres:
    image: postgres:16-alpine
    container_name: team-task-tracker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-team_task_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-team_task_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-team_task_tracker}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: team-task-tracker-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: team-task-tracker-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-team_task_tracker}:${POSTGRES_PASSWORD:-team_task_tracker}@postgres:5432/${POSTGRES_DB:-team_task_tracker}?sslmode=disable
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@team-task-tracker.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Team Task Tracker}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-none}
      EMAIL_DELIVERY_ENABLED: ${EMAIL_DELIVERY_ENABLED:-true}
      EMAIL_WORKER_POLL_INTERVAL: ${EMAIL_WORKER_POLL_INTERVAL:-10s}
      EMAIL_MAX_ATTEMPTS: ${EMAIL_MAX_ATTEMPTS:-5}
      PASSWORD_RESET_TTL: ${PASSWORD_RESET_TTL:-30m}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
      EMAIL_WORKER_METRICS_PORT: ${EMAIL_WORKER_METRICS_PORT:-9091}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  email-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: team-task-tracker-email-worker
    command: go run ./cmd/email-worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-team_task_tracker}:${POSTGRES_PASSWORD:-team_task_tracker}@postgres:5432/${POSTGRES_DB:-team_task_tracker}?sslmode=disable
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@team-task-tracker.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Team Task Tracker}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-none}
      EMAIL_DELIVERY_ENABLED: ${EMAIL_DELIVERY_ENABLED:-true}
      EMAIL_WORKER_POLL_INTERVAL: ${EMAIL_WORKER_POLL_INTERVAL:-10s}
      EMAIL_MAX_ATTEMPTS: ${EMAIL_MAX_ATTEMPTS:-5}
      PASSWORD_RESET_TTL: ${PASSWORD_RESET_TTL:-30m}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
      EMAIL_WORKER_METRICS_PORT: ${EMAIL_WORKER_METRICS_PORT:-9091}
    ports:
      - "${EMAIL_WORKER_METRICS_PORT:-9091}:${EMAIL_WORKER_METRICS_PORT:-9091}"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: team-task-tracker-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backup-worker:
    profiles:
      - monitoring
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: backup-worker
    image: team-task-tracker-backup-worker:local
    container_name: team-task-tracker-backup-worker
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-team_task_tracker}:${POSTGRES_PASSWORD:-team_task_tracker}@postgres:5432/${POSTGRES_DB:-team_task_tracker}?sslmode=disable
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-24h}
      BACKUP_RETRY_INTERVAL: ${BACKUP_RETRY_INTERVAL:-5m}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-7}
      BACKUP_DIR: /backups
      BACKUP_METRICS_PORT: ${BACKUP_METRICS_PORT:-9092}
    ports:
      - "${BACKUP_METRICS_PORT:-9092}:${BACKUP_METRICS_PORT:-9092}"
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${BACKUP_METRICS_PORT}/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  alertmanager:
    profiles:
      - monitoring
    image: prom/alertmanager:v0.33.0
    container_name: team-task-tracker-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./deploy/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/ready >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12

  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus:v3.12.0
    container_name: team-task-tracker-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=1GB
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_started
      email-worker:
        condition: service_started
      backup-worker:
        condition: service_started
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12

  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:13.0.2
    container_name: team-task-tracker-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  frontend_node_modules:
  prometheus_data:
  alertmanager_data:
  grafana_data:
